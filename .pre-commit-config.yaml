# 安装方式：pip install pre-commit && pre-commit install
# 首次安装后建议运行 pre-commit run --all-files 检查全部文件
repos:
  - repo: local
    hooks:
      - id: check-added-large-files
        name: check added large files (>2MB)
        entry: python scripts/pre-commit-large-files.py
        language: system
        types: [file]

      - id: check-merge-conflict
        name: check merge conflict markers
        entry: python scripts/pre-commit-merge-conflict.py
        language: system
        types: [text]
        exclude: 'scripts/pre-commit-merge-conflict\.py$|\.pre-commit-config\.yaml$'

      - id: detect-private-key
        name: detect private keys
        entry: python scripts/pre-commit-detect-private-key.py
        language: system
        types: [text]

      - id: check-json
        name: check json syntax
        entry: python scripts/pre-commit-check-json.py
        language: system
        types: [json]

      - id: check-yaml
        name: check yaml syntax
        entry: python scripts/pre-commit-check-yaml.py
        language: system
        types: [yaml]

      - id: trailing-whitespace
        name: trim trailing whitespace
        entry: python scripts/pre-commit-trailing-whitespace.py
        language: system
        types: [text]

      - id: end-of-file-fixer
        name: fix end of files
        entry: python scripts/pre-commit-eof-fixer.py
        language: system
        types: [text]
        exclude: '\.md$'

      - id: ruff-import-sort
        name: ruff (import sorting — I001)
        entry: python -m ruff check --fix --select I001
        language: system
        types: [python]
        require_serial: true

      - id: ruff
        name: ruff (lint + import sorting)
        entry: python -m ruff check --fix
        language: system
        types: [python]
        require_serial: true
        args: ["--force-exclude"]

      - id: ruff-format
        name: ruff format
        entry: python -m ruff format
        language: system
        types: [python]
        require_serial: true

      - id: mypy
        name: mypy
        entry: python -m mypy
        language: system
        types: [python]
        require_serial: true

      - id: sensitive-file-check
        name: 检查敏感文件
        description: 阻止 config/llm.env、browser-states/*.json 等敏感文件提交
        entry: python scripts/pre-commit-sensitive.py
        language: system
        pass_filenames: true

      # ── frontend ────────────────────────────────────────────────

      - id: eslint
        name: eslint (frontend)
        entry: pnpm -C frontend exec eslint --max-warnings 0 src/
        language: system
        files: ^frontend/
        pass_filenames: false
        require_serial: true

      - id: vue-tsc
        name: vue-tsc (frontend)
        entry: pnpm -C frontend exec vue-tsc --noEmit
        language: system
        files: ^frontend/
        pass_filenames: false
        require_serial: true

      - id: codegen-check
        name: openapi codegen check
        entry: pnpm -C frontend codegen:check
        language: system
        files: ^(argus_py/api/|scripts/codegen|scripts/export_openapi)
        pass_filenames: false
        require_serial: true

      - id: pytest-unit
        name: pytest (unit — pre-push only)
        entry: python -m pytest tests/unit -q --tb=short
        language: system
        pass_filenames: false
        require_serial: true
        stages: [pre-push]
