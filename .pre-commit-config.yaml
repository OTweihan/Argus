# 安装方式：pip install pre-commit && pre-commit install
# 首次安装后建议运行 pre-commit run --all-files 检查全部文件
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
        exclude: 'scripts/pre-commit-merge-conflict\.py$|\.pre-commit-config\.yaml$'
      - id: detect-private-key
      - id: check-json
      - id: check-yaml
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: '\.md$'

  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint + import sorting)
        entry: python -m ruff check --fix
        language: system
        types: [python]
        require_serial: true
        args: ["--force-exclude"]

      - id: ruff-format
        name: ruff format
        entry: python -m ruff format
        language: system
        types: [python]
        require_serial: true

      - id: mypy
        name: mypy
        entry: python -m mypy
        language: system
        types: [python]
        require_serial: true

      - id: sensitive-file-check
        name: 检查敏感文件
        description: 阻止 config/llm.env、browser-states/*.json 等敏感文件提交
        entry: python scripts/pre-commit-sensitive.py
        language: system
        pass_filenames: true

      # ── frontend ────────────────────────────────────────────────

      - id: eslint
        name: eslint (frontend)
        entry: pnpm -C frontend exec eslint --max-warnings 0 src/
        language: system
        files: ^frontend/
        pass_filenames: false
        require_serial: true

      - id: vue-tsc
        name: vue-tsc (frontend)
        entry: pnpm -C frontend exec vue-tsc --noEmit
        language: system
        files: ^frontend/
        pass_filenames: false
        require_serial: true

      - id: codegen-check
        name: openapi codegen check
        entry: pnpm -C frontend codegen:check
        language: system
        files: ^(argus_py/api/|scripts/codegen|scripts/export_openapi)
        pass_filenames: false
        require_serial: true

      - id: pytest-unit
        name: pytest (unit — pre-push only)
        entry: python -m pytest tests/unit -q --tb=short
        language: system
        pass_filenames: false
        require_serial: true
        stages: [pre-push]
