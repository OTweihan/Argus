# 日志配置版本，固定为 1
version: 1

# 是否禁用已经存在的 logger
# false 表示保留第三方库或已初始化的 logger
disable_existing_loggers: false

# =========================
# 日志格式配置
# =========================
formatters:
  # 标准日志格式：包含时间、日志级别、logger 名称和日志内容
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

  # 简洁日志格式：只包含日志级别和日志内容，适合控制台输出
  simple:
    format: "[%(levelname)s] %(message)s"

# =========================
# 日志输出处理器
# =========================
handlers:
  # 控制台日志输出
  console:
    class: logging.StreamHandler

    # 控制台只输出 INFO 及以上级别日志
    level: INFO

    # 使用简洁格式
    formatter: simple

    # 输出到标准输出
    stream: ext://sys.stdout

  # 文件日志输出
  file:
    class: logging.FileHandler

    # 文件记录 DEBUG 及以上级别日志，便于排查问题
    level: DEBUG

    # 使用标准格式
    formatter: standard

    # 日志文件保存路径
    # 注意：需要确保 outputs/logs 目录存在，否则可能启动失败
    filename: outputs/logs/argus.log

    # 日志文件编码，避免中文乱码
    encoding: utf-8

# =========================
# 根 logger 配置
# =========================
root:
  # 根 logger 默认输出 INFO 及以上级别日志
  level: INFO

  # 根 logger 同时输出到控制台和文件
  handlers:
    - console
    - file

# =========================
# 项目 logger 配置
# =========================
loggers:
  # Argus 项目专用 logger
  argus:
    # Argus 内部记录 DEBUG 及以上级别日志
    # 便于开发阶段查看详细执行过程
    level: DEBUG

    # 同时输出到控制台和文件
    handlers:
      - console
      - file

    # 不向 root logger 继续传播，避免日志重复打印
    propagate: false
